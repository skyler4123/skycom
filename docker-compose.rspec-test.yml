name: skycom_rspec_test

services:
  web:
    build: .
    # command optimized for test environment
    command: bash -c "sleep 5 && rm -f tmp/pids/server.pid && bundle exec rails db:prepare && bundle exec rspec"
    environment:
      RAILS_ENV: test
      SKIP_TEST_RUN_SEED: false
      TEST_RUN_INSIDE_DOCKER: true
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    volumes:
      - .:/rails
      - sqlite_storage:/rails/storage
    depends_on:
      - postgres

  job:
    build: .
    command: bash -c "sleep 20 && bundle exec rails db:prepare && bin/jobs"
    environment:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    volumes:
      - .:/rails
      - sqlite_storage:/rails/storage
    depends_on:
      - web

  postgres:
    image: bitnamilegacy/postgresql:17.6.0-debian-12-r4
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: password
    # No volume mapping here to ensure a fresh DB state for every test run
    ports:
      - "5432:5432"

  opensearch:
    image: opensearchproject/opensearch:3
    environment:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: OpensearchPassword@1234
      discovery.type: single-node
      plugins.security.disabled: "true"
      # DISABLE_SECURITY_PLUGIN: "true" # Disables Security plugin
    ports:
      - "9200:9200"
      - "9600:9600"


volumes:
  sqlite_storage: