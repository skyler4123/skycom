# docker-compose.seed-test.yml

name: skycom_seed_test
services:
  web:
    build: .
    command: bash -c "sleep 5 && rm -f tmp/pids/server.pid && bundle exec rails db:prepare"
    environment:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      - postgres

  postgres:
    image: bitnamilegacy/postgresql:17.6.0-debian-12-r4
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: password
    ports:
      - "5432:5432"

  opensearch:
    image: opensearchproject/opensearch:3
    environment:
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: OpensearchPassword@1234
      discovery.type: single-node
      plugins.security.disabled: "true"
      # DISABLE_SECURITY_PLUGIN: "true" # Disables Security plugin
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - es_data:/usr/share/opensearch/data
