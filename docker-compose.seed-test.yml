name: skycom_seed_test
services:
  web:
    build: .
    command: bash -c "sleep 5 && rm -f tmp/pids/server.pid && bundle exec rails db:prepare"
    environment:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
    depends_on:
      - postgres

  postgres:
    image: bitnamilegacy/postgresql:17.6.0-debian-12-r4
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: password
    ports:
      - "5432:5432"
