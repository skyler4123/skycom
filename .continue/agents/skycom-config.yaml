name: Skycom - Clean & Updated Setup
version: 1.0.0
schema: v1

models:
  # ── Fast Autocomplete (Recommended for best UX) ──
  - name: Qwen2.5 Coder 1.5B (Autocomplete)
    provider: ollama
    model: qwen2.5-coder:1.5b
    roles:
      - autocomplete

  # ── Main Daily Models ──
  - name: Qwen2.5 Coder 7B
    provider: ollama
    model: qwen2.5-coder:7b

  - name: Qwen2.5 Coder 3B
    provider: ollama
    model: qwen2.5-coder:3b

  - name: Llama 3.1 8B
    provider: ollama
    model: llama3.1:8b

  # ── Stronger Models ──
  - name: Qwen2.5 Coder 14B
    provider: ollama
    model: qwen2.5-coder:14b

  - name: Gemma3 12B
    provider: ollama
    model: gemma3:12b

  - name: Qwen2.5 Coder 32B
    provider: ollama
    model: qwen2.5-coder:32b

  # ── Heavy / High-Quality Models (Use when needed) ──
  - name: Gemma3 27B
    provider: ollama
    model: gemma3:27b

  # ── Small / Fast Models ──
  - name: DeepSeek R1 1.5B
    provider: ollama
    model: deepseek-r1:1.5b

  - name: Gemma3 4B
    provider: ollama
    model: gemma3:4b

  # ── General Model ──
  - name: Qwen2.5 7B (General)
    provider: ollama
    model: qwen2.5:7b

# ── Tab Autocomplete Configuration ──
tabAutocompleteModel:
  name: Qwen2.5 Coder 1.5B (Autocomplete)
  provider: ollama
  model: qwen2.5-coder:1.5b

# ── Embeddings (Updated to your new version) ──
embeddings:
  provider: ollama
  model: nomic-embed-text:v1.5

# Disable MCP to avoid "Failed to connect to Memory" error
mcpServers: []