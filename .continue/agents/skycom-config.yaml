name: Skycom - Clean Setup
version: 1.0.0
schema: v1

models:
  # ── Fast Autocomplete ──
  - name: Qwen2.5 Coder 1.5B
    provider: ollama
    model: qwen2.5-coder:1.5b
    roles:
      - autocomplete

  # ── Main Models for Chat / Edit / Apply ──
  - name: Qwen2.5 Coder 7B
    provider: ollama
    model: qwen2.5-coder:7b

  - name: Qwen2.5 Coder 3B
    provider: ollama
    model: qwen2.5-coder:3b

  - name: Llama 3.1 8B
    provider: ollama
    model: llama3.1:8b

  - name: Qwen2.5 7B (General)
    provider: ollama
    model: qwen2.5:7b

# ── Tab Autocomplete (Very Important) ──
tabAutocompleteModel:
  name: Qwen2.5 Coder 3B
  provider: ollama
  model: qwen2.5-coder:3b

# ── Embeddings for @codebase ──
embeddings:
  provider: ollama
  model: nomic-embed-text:latest

# Disable MCP to avoid Memory error
mcpServers: []